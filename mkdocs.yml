INHERIT: ./mkdocs.env.yml
site_name: Asyncer
site_description: Asyncer, async and await, focused on developer experience.
site_url: https://asyncer.tiangolo.com/
theme:
  variant: classic
  name: material
  palette:
  - media: "(prefers-color-scheme)"
    toggle:
      icon: material/lightbulb-auto
      name: Switch to light mode
  - media: '(prefers-color-scheme: light)'
    scheme: default
    primary: orange
    accent: indigo
    toggle:
      icon: material/lightbulb
      name: Switch to dark mode
  - media: '(prefers-color-scheme: dark)'
    scheme: slate
    primary: orange
    accent: indigo
    toggle:
      icon: material/lightbulb-outline
      name: Switch to system preference
  features:
  - content.code.annotate
  - content.code.copy
  # - content.code.select
  - content.footnote.tooltips
  - content.tabs.link
  - content.tooltips
  - navigation.footer
  - navigation.indexes
  - navigation.instant
  - navigation.instant.prefetch
  # - navigation.instant.preview
  - navigation.instant.progress
  - navigation.path
  - navigation.tabs
  - navigation.tabs.sticky
  - navigation.top
  - navigation.tracking
  - search.highlight
  - search.share
  - search.suggest
  - toc.follow

  icon:
    repo: octicons/mark-github-24
  logo: img/icon-white.svg
  favicon: img/favicon.png
  language: en
repo_name: fastapi/asyncer
repo_url: https://github.com/fastapi/asyncer

nav:
  - Asyncer: index.md
  - "":
    - tutorial/index.md
    - tutorial/install.md
    - tutorial/first-steps.md
    - tutorial/runnify.md
    - tutorial/soonify.md
    - tutorial/soonify-return.md
    - tutorial/asyncify.md
    - tutorial/syncify.md
    - tutorial/syncify-no-raise.md
  - "":
    - resources/index.md
    - help.md
    - contributing.md
    - management-tasks.md
  - "":
    - about/index.md
    - management.md
  - release-notes.md

markdown_extensions:
  # Zensical
  zensical.extensions.macros:
  # Material for MkDocs
  material.extensions.preview:
    targets:
      include:
        - "*"
  # Python Markdown
  abbr:
  attr_list:
  footnotes:
  md_in_html:
  tables:
  toc:
    permalink: true

  # Python Markdown Extensions
  pymdownx.betterem:
    smart_enable: all
  pymdownx.caret:
  pymdownx.highlight:
    line_spans: __span
  pymdownx.inlinehilite:
  pymdownx.keys:
  pymdownx.mark:
  pymdownx.superfences:
    custom_fences:
    - name: mermaid
      class: mermaid
      format: !!python/name:pymdownx.superfences.fence_code_format
  pymdownx.tilde:
  markdown_include_variants: null

  # pymdownx blocks
  pymdownx.blocks.admonition:
  pymdownx.blocks.details:
  pymdownx.blocks.tab:
    alternate_style: True

  # Other extensions
  mdx_include:

extra:
  social:
    - icon: octicons/mark-github-24
      link: https://github.com/fastapi/asyncer
    - icon: fontawesome/brands/x-twitter
      link: https://x.com/tiangolo
    - icon: fontawesome/brands/bluesky
      link: https://bsky.app/profile/tiangolo.com
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/tiangolo
    - icon: fontawesome/solid/globe
      link: https://tiangolo.com

extra_css:
  - css/termynal.css
  - css/custom.css

extra_javascript:
  - js/termynal.js
  - js/custom.js

validation:
  unresolved_references: false
